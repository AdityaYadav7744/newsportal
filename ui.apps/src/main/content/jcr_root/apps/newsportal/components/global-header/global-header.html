<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @categories='global.header'}"/>

<header class="custom-header">

    <!-- Hamburger (Left side for mobile) -->
    <div class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Logo -->
    <div class="header-logo"
         data-sly-resource="${'logo' @ resourceType='core/wcm/components/image/v2/image'}">
    </div>

    <!-- Navigation -->
    <nav class="header-nav"
         data-sly-resource="${'navigation' @ resourceType='core/wcm/components/navigation/v2/navigation'}">
    </nav>

    <!-- CTA Button -->
    <div class="header-cta">
        <button class="login-btn">Login</button>
    </div>

</header>

<!-- LOGIN MODAL -->
<div class="login-modal">
    <div class="login-content">
        <span class="close-btn">&times;</span>
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Submit</button>
        </form>
    </div>
</div>
