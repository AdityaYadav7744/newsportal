<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.all @ categories='carousel.v1'}"/>
<sly data-sly-use.model="com.bhaska.newsportal.core.models.CarouselModelV1"/>

<div class="carousel-v1">

    <div class="carousel-wrapper" data-sly-list.item="${model.carouselItems}">
        
        <div class="carousel-item">

            <div class="carousel-image">
                <img src="${item.image}" alt="${item.title}"/>
            </div>

            <div class="carousel-content">
                <h2>${item.title}</h2>

                <a href="${item.buttonLink}" class="carousel-btn">
                    ${item.buttonText}
                </a>
            </div>

        </div>

    </div>

</div>
